search:
  keywords:
    - python developer
    - python engineer
    - junior developer
    - senior developer
    - frontend developer
    - frontend engineer
    - backend developer
    - backend engineer
    - software engineer
    - software developer
    - django developer
    - fastapi developer
    - full stack developer
    - full-stack developer

  locations:
    - bangladesh
    - dhaka
    - chittagong
    - remote
    - anywhere

  exclude_keywords:
    - principal
    - director

  exclude_companies:
    - "Scam Corp Ltd"

  max_age_hours: 72
  min_fit_score: 6

scraping:
  request_delay_seconds: 3
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  max_retries: 2
  timeout_seconds: 15

llm:
  # Groq free models — see console.groq.com/docs/models
  model: "llama-3.3-70b-versatile"        # tailoring: best quality free model
  scoring_model: "llama-3.1-8b-instant"   # scoring: fast + free, sufficient for 0-10 scoring
  max_tokens_scoring: 300
  max_tokens_tailoring: 2000

notifications:
  telegram_enabled: true
  email_enabled: false
